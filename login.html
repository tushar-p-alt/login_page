<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Animated Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 1. Moving Gradient Background Animation */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animated-bg {
            background: linear-gradient(-45deg, #4f46e5, #7c3aed, #ec4899, #2563eb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        /* 2. Page Load Reveal Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reveal-card {
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.2s;
        }

        /* 3. Floating Label Animation Mechanics */
        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            transform: translateY(-24px) scale(0.85);
            color: #4f46e5;
            background-color: #ffffff;
            padding: 0 6px;
        }

        .input-group input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        /* 4. Interactive Ripple-like Hover for Buttons */
        .btn-animate {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .btn-animate:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -10px rgba(79, 70, 229, 0.5);
        }
        .btn-animate:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body class="animated-bg min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-8 overflow-hidden font-sans antialiased">

    <div class="absolute top-1/4 left-1/4 w-72 h-72 bg-pink-500 rounded-full mix-blend-multiply filter blur-2xl opacity-20 animate-pulse"></div>
    <div class="absolute bottom-1/4 right-1/4 w-72 h-72 bg-blue-500 rounded-full mix-blend-multiply filter blur-2xl opacity-20 animate-pulse" style="animation-delay: 2s;"></div>

    <div class="reveal-card w-full max-w-md bg-white/95 backdrop-blur-md rounded-2xl shadow-2xl p-8 sm:p-10 border border-white/20 z-10">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center h-12 w-12 rounded-xl bg-indigo-600 text-white shadow-lg shadow-indigo-600/30 mb-4 transition-transform duration-500 hover:rotate-12">
                <i class="fa-solid fa-cubes text-xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Welcome Back</h2>
            <p class="text-sm text-gray-500 mt-1">Please enter your details to sign in</p>
        </div>

        <form class="space-y-6" onsubmit="event.preventDefault(); alert('Form submitted successfully!');">
            
            <div class="input-group relative">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400">
                    <i class="fa-regular fa-envelope text-sm"></i>
                </div>
                <input type="email" id="email" placeholder=" " required autocomplete="email"
                    class="block w-full pl-10 pr-4 py-3 bg-transparent border border-gray-200 rounded-xl text-gray-900 text-sm focus:outline-none transition-all duration-200 ease-in-out">
                <label for="email" 
                    class="absolute left-10 top-3 text-sm text-gray-400 pointer-events-none transition-all duration-200 ease-in-out origin-left">
                    Email Address
                </label>
            </div>

            <div class="input-group relative">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400">
                    <i class="fa-solid fa-lock text-sm"></i>
                </div>
                <input type="password" id="password" placeholder=" " required
                    class="block w-full pl-10 pr-10 py-3 bg-transparent border border-gray-200 rounded-xl text-gray-900 text-sm focus:outline-none transition-all duration-200 ease-in-out">
                <label for="password" 
                    class="absolute left-10 top-3 text-sm text-gray-400 pointer-events-none transition-all duration-200 ease-in-out origin-left">
                    Password
                </label>
                <button type="button" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-400 hover:text-gray-600 transition-colors">
                    <i class="fa-regular fa-eye text-sm"></i>
                </button>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center cursor-pointer select-none text-gray-600">
                    <input type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500/30 border-gray-300 rounded cursor-pointer transition duration-150">
                    <span class="ml-2">Remember me</span>
                </label>
                <a href="#" class="text-indigo-600 font-semibold hover:text-indigo-500 transition-colors">Forgot password?</a>
            </div>

            <button type="submit" 
                class="btn-animate w-full flex justify-center py-3 px-4 border border-transparent rounded-xl text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 shadow-md">
                Sign In
            </button>
        </form>

        <div class="mt-6 relative flex items-center justify-center">
            <div class="border-t border-gray-200 w-full absolute"></div>
            <span class="bg-white px-3 text-xs text-gray-400 z-10 tracking-wider uppercase">Or connect via</span>
        </div>

        <div class="mt-6 grid grid-cols-2 gap-3">
            <button class="flex items-center justify-center py-2.5 px-4 border border-gray-200 rounded-xl text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 active:bg-gray-100 transition-all duration-150 hover:border-gray-300">
                <i class="fa-brands fa-google text-red-500 mr-2"></i> Google
            </button>
            <button class="flex items-center justify-center py-2.5 px-4 border border-gray-200 rounded-xl text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 active:bg-gray-100 transition-all duration-150 hover:border-gray-300">
                <i class="fa-brands fa-apple text-black mr-2 text-base"></i> Apple
            </button>
        </div>

        <p class="text-center text-sm text-gray-500 mt-8">
            Don't have an account? <a href="#" class="text-indigo-600 font-semibold hover:underline">Sign up free</a>
        </p>

    </div>

</body>
</html>
